<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 210" width="820" height="210" role="img" aria-labelledby="title desc">
  <title id="title">Research map</title>
  <desc id="desc">A minimal academic research map showing constrained optimization problems, evolutionary search, engineering evaluation, and reproducible evidence.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M1 1.2L7 4L1 6.8" fill="none" stroke="#5d6b7a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text {
        font-family: Arial, Helvetica, sans-serif;
        fill: #17202a;
      }
      .label { font-size: 15px; font-weight: 700; }
      .sub { font-size: 11.5px; fill: #657181; }
      .note { font-size: 11px; fill: #7a8594; }
      .box { fill: #ffffff; stroke: #cfd7df; stroke-width: 1.1; rx: 7; }
      .boxCore { fill: #f7fbfb; stroke: #85aaa5; stroke-width: 1.25; rx: 7; }
      .axis { stroke: #5d6b7a; stroke-width: 1.35; fill: none; marker-end: url(#arrow); }
      .feedback { stroke: #8aa39f; stroke-width: 1.15; fill: none; marker-end: url(#arrow); stroke-dasharray: 4 5; }
      .tick { stroke: #b8c2cc; stroke-width: 1; }
      .dot { fill: #6f9993; opacity: .85; }
    </style>
  </defs>

  <rect width="820" height="210" fill="#ffffff"/>

  <g transform="translate(42 28)">
    <text class="note" x="0" y="0">Constrained black-box optimization for wind energy systems</text>
    <line class="tick" x1="0" y1="12" x2="736" y2="12"/>
  </g>

  <g transform="translate(52 78)">
    <rect class="box" x="0" y="0" width="142" height="58"/>
    <text class="label" x="18" y="24">Problem space</text>
    <text class="sub" x="18" y="43">layout, cable, yaw</text>
  </g>

  <path class="axis" d="M210 107H252"/>

  <g transform="translate(268 78)">
    <rect class="boxCore" x="0" y="0" width="154" height="58"/>
    <text class="label" x="18" y="24">Evolutionary search</text>
    <text class="sub" x="18" y="43">population update</text>
  </g>

  <path class="axis" d="M438 107H480"/>

  <g transform="translate(496 78)">
    <rect class="box" x="0" y="0" width="154" height="58"/>
    <text class="label" x="18" y="24">Engineering evaluation</text>
    <text class="sub" x="18" y="43">wake, cost, constraints</text>
  </g>

  <path class="axis" d="M666 107H708"/>

  <g transform="translate(724 78)">
    <rect class="box" x="0" y="0" width="70" height="58"/>
    <text class="label" x="14" y="24">Evidence</text>
    <text class="sub" x="14" y="43">code + papers</text>
  </g>

  <path class="feedback" d="M575 148C530 178 378 178 339 148">
    <animate attributeName="stroke-dashoffset" from="18" to="0" dur="3.2s" repeatCount="indefinite"/>
  </path>
  <text class="note" x="419" y="185">limited evaluations</text>

  <circle class="dot" cx="344" cy="107" r="3">
    <animate attributeName="opacity" values=".35;.95;.35" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
