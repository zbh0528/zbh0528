<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" width="1000" height="430" role="img" aria-labelledby="title desc">
  <title id="title">Research snapshot</title>
  <desc id="desc">A Nature-style dynamic schematic for structure-aware evolutionary optimization in wind energy systems.</desc>
  <defs>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#8a98a8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#6f95c8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #1f2933;
      }
      .mono { font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace; }
      .title { font-size: 23px; font-weight: 760; }
      .subtitle { font-size: 13px; fill: #637083; }
      .panel { fill: #fbfcfd; stroke: #dbe3ea; stroke-width: 1.1; }
      .panelTitle { font-size: 13px; font-weight: 740; fill: #263241; }
      .nodeTitle { font-size: 11.5px; font-weight: 690; fill: #283446; }
      .small { font-size: 10.5px; fill: #667587; }
      .micro { font-size: 9.5px; fill: #748294; }
      .chip { fill: #f8fafc; stroke: #dde5ec; stroke-width: 1; }
      .line { fill: none; stroke: #c8d3dc; stroke-width: 1.3; stroke-linecap: round; }
      .flow { fill: none; stroke: #6f95c8; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 8 9; marker-end: url(#arrowBlue); }
      .softFlow { fill: none; stroke: #9aa8b6; stroke-width: 1.7; stroke-linecap: round; stroke-dasharray: 7 8; marker-end: url(#arrowSoft); }
    </style>
  </defs>

  <rect width="1000" height="430" fill="#ffffff"/>

  <g transform="translate(42 38)">
    <text class="title" x="0" y="0">Research Snapshot</text>
    <text class="subtitle" x="0" y="22">Structure-aware evolutionary optimization</text>
  </g>

  <g transform="translate(640 22)">
    <rect class="chip" x="0" y="0" width="78" height="26" rx="13" fill="#eef5fc" stroke="#cbdcec"/>
    <text class="small" x="39" y="17" text-anchor="middle">EC</text>
    <rect class="chip" x="90" y="0" width="118" height="26" rx="13" fill="#f0f7f5" stroke="#cde3dc"/>
    <text class="small" x="149" y="17" text-anchor="middle">Black-box Opt.</text>
    <rect class="chip" x="220" y="0" width="98" height="26" rx="13" fill="#fbf4ea" stroke="#ead8bd"/>
    <text class="small" x="269" y="17" text-anchor="middle">Wind Energy</text>
  </g>

  <g transform="translate(46 86)">
    <rect class="panel" width="246" height="232" rx="14"/>
    <text class="panelTitle" x="20" y="30">A. Problem</text>
    <text class="micro mono" x="20" y="50">variables + costly evaluator</text>

    <g transform="translate(26 78)">
      <rect x="0" y="0" width="88" height="88" rx="12" fill="#f5f9fd" stroke="#d6e5f2"/>
      <text class="nodeTitle" x="44" y="23" text-anchor="middle">Design x</text>
      <g transform="translate(22 40)" stroke="#8fb3d9" stroke-width="1.2">
        <path d="M0 0H44M0 18H44M0 36H44M0 0V36M22 0V36M44 0V36" fill="none"/>
      </g>
      <circle cx="31" cy="50" r="3.4" fill="#8fb3d9"/>
      <circle cx="48" cy="68" r="3.4" fill="#a6d6cf"/>
      <circle cx="66" cy="55" r="3.4" fill="#d9c5e6">
        <animate attributeName="opacity" values=".4;1;.4" dur="2.6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g transform="translate(134 78)">
      <rect x="0" y="0" width="78" height="88" rx="12" fill="#f8f6fb" stroke="#dfd2eb"/>
      <text class="nodeTitle" x="39" y="23" text-anchor="middle">min f(x)</text>
      <path d="M25 52C25 41 33 33 44 33C55 33 63 41 63 52C63 63 55 71 44 71C33 71 25 63 25 52Z" fill="none" stroke="#9c83b8" stroke-width="1.5"/>
      <path d="M44 38V52L55 58" fill="none" stroke="#9c83b8" stroke-width="1.5" stroke-linecap="round"/>
      <text class="micro" x="39" y="80" text-anchor="middle">expensive</text>
    </g>

    <g transform="translate(23 186)">
      <rect x="0" y="0" width="58" height="22" rx="7" fill="#eef5fc" stroke="#cbdcec"/>
      <text class="micro" x="29" y="15" text-anchor="middle">layout</text>
      <rect x="70" y="0" width="56" height="22" rx="7" fill="#f0f7f5" stroke="#cde3dc"/>
      <text class="micro" x="98" y="15" text-anchor="middle">cable</text>
      <rect x="138" y="0" width="48" height="22" rx="7" fill="#fbf4ea" stroke="#ead8bd"/>
      <text class="micro" x="162" y="15" text-anchor="middle">yaw</text>
    </g>
  </g>

  <path class="softFlow" d="M294 202C310 202 319 202 333 202">
    <animate attributeName="stroke-dashoffset" from="34" to="0" dur="2.7s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(332 70)">
    <rect class="panel" width="336" height="264" rx="16"/>
    <text class="panelTitle" x="20" y="31">B. Evolutionary Engine</text>
    <text class="micro mono" x="20" y="51">population -> prior -> variation -> eval -> archive</text>

    <path id="engineLoop" d="M78 118C101 68 169 56 220 86C269 115 279 179 241 216C199 257 113 244 80 192C65 168 65 141 78 118Z" fill="none" stroke="#d3dde6" stroke-width="1.2"/>
    <path class="flow" d="M78 118C101 68 169 56 220 86C269 115 279 179 241 216C199 257 113 244 80 192C65 168 65 141 78 118Z">
      <animate attributeName="stroke-dashoffset" from="42" to="0" dur="3.4s" repeatCount="indefinite"/>
    </path>

    <g transform="translate(64 91)">
      <circle cx="0" cy="0" r="34" fill="#f5f9fd" stroke="#cbdcec" stroke-width="1.3"/>
      <text class="nodeTitle" x="0" y="-5" text-anchor="middle">Population</text>
      <text class="micro" x="0" y="10" text-anchor="middle">x_t</text>
      <circle cx="-12" cy="-18" r="3" fill="#8fb3d9"/>
      <circle cx="6" cy="-12" r="3" fill="#a6d6cf"/>
      <circle cx="-5" cy="20" r="3" fill="#d9c5e6"/>
    </g>

    <g transform="translate(170 80)">
      <rect x="-48" y="-26" width="96" height="52" rx="13" fill="#f0f7f5" stroke="#cde3dc"/>
      <text class="nodeTitle" x="0" y="-5" text-anchor="middle">Structure</text>
      <text class="micro" x="0" y="11" text-anchor="middle">prior</text>
      <path d="M-17 20L0 -19L18 20Z" fill="none" stroke="#79b8ad" stroke-width="1.5"/>
    </g>

    <g transform="translate(260 128)">
      <circle cx="0" cy="0" r="34" fill="#fbf4ea" stroke="#ead8bd" stroke-width="1.3"/>
      <text class="nodeTitle" x="0" y="-5" text-anchor="middle">Variation</text>
      <text class="micro" x="0" y="10" text-anchor="middle">DE / swarm</text>
      <path d="M-14 22C-2 6 3 -2 14 -20" fill="none" stroke="#d0a96f" stroke-width="1.5"/>
      <path d="M-14 -20C-3 -5 4 8 15 22" fill="none" stroke="#d0a96f" stroke-width="1.5"/>
    </g>

    <g transform="translate(220 216)">
      <rect x="-50" y="-24" width="100" height="48" rx="13" fill="#f8f6fb" stroke="#dfd2eb"/>
      <text class="nodeTitle" x="0" y="-4" text-anchor="middle">Evaluation</text>
      <text class="micro" x="0" y="11" text-anchor="middle">budgeted</text>
      <circle cx="38" cy="-14" r="4" fill="#9c83b8">
        <animate attributeName="r" values="3.2;5.3;3.2" dur="2.1s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g transform="translate(92 214)">
      <rect x="-46" y="-24" width="92" height="48" rx="13" fill="#f7fafc" stroke="#dbe3ea"/>
      <text class="nodeTitle" x="0" y="-4" text-anchor="middle">Archive</text>
      <text class="micro" x="0" y="11" text-anchor="middle">non-repeat</text>
      <path d="M-22 18H22M-22 23H22" stroke="#9aa8b6" stroke-width="1.2"/>
    </g>

    <circle cx="64" cy="91" r="4.5" fill="#6f95c8">
      <animate attributeName="cx" values="64;170;260;220;92;64" dur="5.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="91;80;128;216;214;91" dur="5.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".35;1;.75;1;.7;.35" dur="5.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <path class="softFlow" d="M668 202C687 202 696 202 710 202">
    <animate attributeName="stroke-dashoffset" from="34" to="0" dur="2.7s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(710 86)">
    <rect class="panel" width="244" height="232" rx="14"/>
    <text class="panelTitle" x="20" y="30">C. Wind System</text>
    <text class="micro mono" x="20" y="50">layout + cables + yaw</text>

    <g transform="translate(25 70)">
      <path d="M24 130C58 102 88 112 116 84C144 56 168 64 202 32" fill="none" stroke="#dfe8ec" stroke-width="8" stroke-linecap="round"/>
      <path d="M24 130C58 102 88 112 116 84C144 56 168 64 202 32" fill="none" stroke="#85c8bd" stroke-width="2.2" stroke-dasharray="7 8" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" from="30" to="0" dur="2.6s" repeatCount="indefinite"/>
      </path>

      <g stroke="#719bce" stroke-width="1.6" fill="none" stroke-linecap="round">
        <path d="M34 116V80M34 80L18 69M34 80L50 69M34 80L35 57"/>
        <path d="M91 104V69M91 69L75 58M91 69L107 58M91 69L92 46"/>
        <path d="M145 73V39M145 39L129 28M145 39L161 28M145 39L146 16"/>
        <path d="M194 48V18M194 18L180 8M194 18L208 8M194 18L195 -2"/>
      </g>
      <g fill="#ffffff" stroke="#9c83b8" stroke-width="1.6">
        <circle cx="34" cy="116" r="7.5"/>
        <circle cx="91" cy="104" r="7.5"/>
        <circle cx="145" cy="73" r="7.5"/>
        <circle cx="194" cy="48" r="7.5"/>
      </g>
      <g fill="none" stroke="#d0a96f" stroke-width="1.6" stroke-linecap="round">
        <path d="M32 106A22 22 0 0 1 55 116">
          <animate attributeName="opacity" values=".35;1;.35" dur="2.5s" repeatCount="indefinite"/>
        </path>
        <path d="M89 94A22 22 0 0 1 112 104">
          <animate attributeName="opacity" values="1;.35;1" dur="2.7s" repeatCount="indefinite"/>
        </path>
        <path d="M143 63A22 22 0 0 1 166 73">
          <animate attributeName="opacity" values=".45;1;.45" dur="2.9s" repeatCount="indefinite"/>
        </path>
      </g>
    </g>

    <g transform="translate(28 190)">
      <rect class="chip" x="0" y="0" width="56" height="22" rx="7" fill="#eef5fc" stroke="#cbdcec"/>
      <text class="micro" x="28" y="15" text-anchor="middle">Layout</text>
      <rect class="chip" x="67" y="0" width="58" height="22" rx="7" fill="#f0f7f5" stroke="#cde3dc"/>
      <text class="micro" x="96" y="15" text-anchor="middle">Cables</text>
      <rect class="chip" x="136" y="0" width="48" height="22" rx="7" fill="#fbf4ea" stroke="#ead8bd"/>
      <text class="micro" x="160" y="15" text-anchor="middle">Yaw</text>
    </g>
  </g>

  <g transform="translate(46 356)">
    <text class="panelTitle" x="0" y="0">D. Evidence</text>
    <line x1="88" y1="-4" x2="912" y2="-4" stroke="#dbe3ea" stroke-width="1.2"/>

    <g transform="translate(116 20)">
      <circle cx="0" cy="0" r="7" fill="#8fb3d9">
        <animate attributeName="opacity" values=".45;1;.45" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <text class="small" x="17" y="4">DOI papers</text>
    </g>
    <g transform="translate(312 20)">
      <circle cx="0" cy="0" r="7" fill="#85c8bd">
        <animate attributeName="opacity" values=".55;1;.55" dur="2.7s" repeatCount="indefinite"/>
      </circle>
      <text class="small" x="17" y="4">Open code</text>
    </g>
    <g transform="translate(500 20)">
      <circle cx="0" cy="0" r="7" fill="#e6c08a">
        <animate attributeName="opacity" values=".65;1;.65" dur="3s" repeatCount="indefinite"/>
      </circle>
      <text class="small" x="17" y="4">Benchmarks</text>
    </g>
    <g transform="translate(704 20)">
      <circle cx="0" cy="0" r="7" fill="#cdb8de">
        <animate attributeName="opacity" values=".5;1;.5" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <text class="small" x="17" y="4">Traceable artifacts</text>
    </g>
  </g>
</svg>
