<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" width="1000" height="540" role="img" aria-labelledby="title desc">
  <title id="title">Research system snapshot</title>
  <desc id="desc">A clean Apple-style research system diagram with separated input, optimization, wind-system output, and evidence layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfdff"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6fbf9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#72a7f4"/>
      <stop offset=".52" stop-color="#6ccfc0"/>
      <stop offset="1" stop-color="#b69ae9"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8fb9ff" stop-opacity=".34"/>
      <stop offset="1" stop-color="#8fb9ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-12%" y="-14%" width="124%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#42546a" flood-opacity=".11"/>
    </filter>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9.5" refY="5.5" orient="auto">
      <path d="M1 1L10 5.5L1 10" fill="none" stroke="#8190a3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #18212f;
      }
      .mono { font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace; }
      .kicker { font-size: 12px; font-weight: 760; fill: #6e7d91; letter-spacing: .8px; }
      .title { font-size: 26px; font-weight: 780; letter-spacing: -.2px; }
      .sub { font-size: 14px; fill: #68778c; }
      .cardTitle { font-size: 15px; font-weight: 760; fill: #202b3a; }
      .label { font-size: 12px; font-weight: 680; fill: #4f6176; }
      .small { font-size: 11px; fill: #6c7b90; }
      .node { fill: #ffffff; stroke: #dfe8f1; stroke-width: 1.1; }
      .flow { fill: none; stroke: url(#accent); stroke-width: 3.2; stroke-linecap: round; stroke-dasharray: 12 12; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1000" height="540" rx="30" fill="url(#bg)"/>
  <circle cx="500" cy="274" r="230" fill="url(#glow)">
    <animate attributeName="r" values="210;240;210" dur="7s" repeatCount="indefinite"/>
  </circle>

  <g transform="translate(54 48)">
    <text class="kicker mono" x="0" y="0">RESEARCH SYSTEM</text>
    <text class="title" x="0" y="34">Optimization pipeline for wind energy systems</text>
    <text class="sub" x="0" y="58">Decision variables enter a budgeted evolutionary loop and leave as traceable engineering artifacts.</text>
  </g>

  <g transform="translate(58 130)" filter="url(#shadow)">
    <rect x="0" y="0" width="238" height="248" rx="28" fill="#ffffff" fill-opacity=".88" stroke="#e0e9f2"/>
    <text class="cardTitle" x="26" y="38">Input Layer</text>
    <text class="small" x="26" y="61">constrained design variables</text>

    <g transform="translate(26 92)">
      <rect class="node" x="0" y="0" width="184" height="42" rx="15" fill="#f3f8ff"/>
      <circle cx="23" cy="21" r="7" fill="#7eb0f1"/>
      <text class="label" x="44" y="26">Layout variables</text>

      <rect class="node" x="0" y="58" width="184" height="42" rx="15" fill="#f2fbf8"/>
      <circle cx="23" cy="79" r="7" fill="#78d0c2"/>
      <text class="label" x="44" y="84">Cable topology</text>

      <rect class="node" x="0" y="116" width="184" height="42" rx="15" fill="#fbf6ee"/>
      <circle cx="23" cy="137" r="7" fill="#e6bf82"/>
      <text class="label" x="44" y="142">Yaw settings</text>
    </g>
  </g>

  <path class="flow" d="M312 254C338 254 358 254 384 254">
    <animate attributeName="stroke-dashoffset" from="48" to="0" dur="3s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(382 112)" filter="url(#shadow)">
    <rect x="0" y="0" width="290" height="286" rx="36" fill="#ffffff" fill-opacity=".92" stroke="#dfe8f1"/>
    <text class="cardTitle" x="28" y="40">Evolutionary Core</text>
    <text class="small" x="28" y="63">structure-aware, budgeted search</text>

    <g transform="translate(48 88)">
      <circle cx="96" cy="86" r="78" fill="#f8fbff" stroke="#dfe8f1"/>
      <circle cx="96" cy="86" r="48" fill="#ffffff" stroke="#dfe8f1"/>
      <path d="M96 10C138 10 172 44 172 86C172 128 138 162 96 162C54 162 20 128 20 86C20 44 54 10 96 10Z" fill="none" stroke="url(#accent)" stroke-width="4.2" stroke-dasharray="18 17" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" from="70" to="0" dur="4.8s" repeatCount="indefinite"/>
      </path>
      <circle cx="96" cy="10" r="7" fill="#72a7f4">
        <animate attributeName="cx" values="96;150;172;96;42;20;96" dur="4.8s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="10;32;86;162;140;86;10" dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <text class="label" x="96" y="82" text-anchor="middle">DE / GA</text>
      <text class="small mono" x="96" y="101" text-anchor="middle">x_t -> x*</text>
    </g>

    <g transform="translate(24 248)">
      <rect x="0" y="0" width="74" height="25" rx="12.5" fill="#f3f8ff" stroke="#d7e7fb"/>
      <text class="small" x="37" y="17" text-anchor="middle">prior</text>
      <rect x="86" y="0" width="82" height="25" rx="12.5" fill="#f2fbf8" stroke="#d3ece6"/>
      <text class="small" x="127" y="17" text-anchor="middle">archive</text>
      <rect x="180" y="0" width="78" height="25" rx="12.5" fill="#faf7ff" stroke="#e3d6f2"/>
      <text class="small" x="219" y="17" text-anchor="middle">diversity</text>
    </g>
  </g>

  <path class="flow" d="M686 254C712 254 732 254 758 254">
    <animate attributeName="stroke-dashoffset" from="48" to="0" dur="3s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(758 130)" filter="url(#shadow)">
    <rect x="0" y="0" width="184" height="248" rx="28" fill="#ffffff" fill-opacity=".88" stroke="#e0e9f2"/>
    <text class="cardTitle" x="24" y="38">Output Layer</text>
    <text class="small" x="24" y="61">wind system design</text>

    <g transform="translate(20 86)">
      <path d="M14 118C43 90 64 98 88 72C112 46 130 52 148 26" fill="none" stroke="#dfe8ef" stroke-width="9" stroke-linecap="round"/>
      <path d="M14 118C43 90 64 98 88 72C112 46 130 52 148 26" fill="none" stroke="#6ccfc0" stroke-width="2.8" stroke-dasharray="8 8" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" from="32" to="0" dur="2.5s" repeatCount="indefinite"/>
      </path>
      <g stroke="#6f9fd8" stroke-width="1.8" fill="none" stroke-linecap="round">
        <path d="M30 108V75M30 75L16 65M30 75L44 65M30 75L31 54"/>
        <path d="M82 88V57M82 57L68 47M82 57L96 47M82 57L83 36"/>
        <path d="M132 50V22M132 22L120 13M132 22L144 13M132 22L133 2"/>
      </g>
      <g fill="#ffffff" stroke="#b69ae9" stroke-width="1.8">
        <circle cx="30" cy="108" r="7"/>
        <circle cx="82" cy="88" r="7"/>
        <circle cx="132" cy="50" r="7"/>
      </g>
      <path d="M28 99A21 21 0 0 1 50 108" fill="none" stroke="#e0b56f" stroke-width="1.8" stroke-linecap="round">
        <animate attributeName="opacity" values=".35;1;.35" dur="2.6s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <g transform="translate(74 430)" filter="url(#shadow)">
    <rect x="0" y="0" width="852" height="58" rx="29" fill="#ffffff" fill-opacity=".90" stroke="#e2eaf2"/>
    <g transform="translate(34 0)">
      <circle cx="0" cy="29" r="8" fill="#83b2ef"/>
      <text class="label" x="22" y="34">DOI papers</text>
    </g>
    <g transform="translate(232 0)">
      <circle cx="0" cy="29" r="8" fill="#79d0c2"/>
      <text class="label" x="22" y="34">Open code</text>
    </g>
    <g transform="translate(420 0)">
      <circle cx="0" cy="29" r="8" fill="#e6bf82"/>
      <text class="label" x="22" y="34">Benchmarks</text>
    </g>
    <g transform="translate(628 0)">
      <circle cx="0" cy="29" r="8" fill="#c5a8ef"/>
      <text class="label" x="22" y="34">Traceable artifacts</text>
    </g>
  </g>
</svg>
