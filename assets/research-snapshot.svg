<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" width="1000" height="460" role="img" aria-labelledby="title desc">
  <title id="title">Research snapshot</title>
  <desc id="desc">An academic graphical abstract connecting high-dimensional expensive optimization, structure-aware evolutionary search, wind energy systems, and reproducible research artifacts.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfcfe"/>
      <stop offset="1" stop-color="#eef4f7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3267a5"/>
      <stop offset=".48" stop-color="#2b9a8d"/>
      <stop offset="1" stop-color="#7b5d8f"/>
    </linearGradient>
    <linearGradient id="engineFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbfd"/>
      <stop offset="1" stop-color="#eaf2f6"/>
    </linearGradient>
    <filter id="softShadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#223044" flood-opacity=".12"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#d9e2e8" stroke-width=".8" opacity=".6"/>
    </pattern>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0 0L9 4.5L0 9Z" fill="#456176"/>
    </marker>
    <style>
      text {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #182333;
      }
      .mono { font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace; }
      .title { font-size: 24px; font-weight: 780; }
      .subtitle { font-size: 15px; fill: #536271; }
      .label { font-size: 14px; font-weight: 720; fill: #253246; }
      .small { font-size: 12.5px; fill: #5d6b78; }
      .tiny { font-size: 11px; fill: #6f7b88; }
      .darkSmall { font-size: 12.5px; fill: #dbe7ef; }
      .darkTiny { font-size: 11px; fill: #f7fbfd; }
      .axis { stroke: #8ea0ad; stroke-width: 1.4; }
      .hairline { stroke: #d6e0e7; stroke-width: 1; }
      .flow {
        stroke: url(#accent);
        stroke-width: 3.5;
        fill: none;
        stroke-linecap: round;
        stroke-dasharray: 10 11;
      }
    </style>
  </defs>

  <rect width="1000" height="460" rx="22" fill="#f4f7fa"/>
  <rect x="18" y="18" width="964" height="424" rx="20" fill="url(#paper)" stroke="#d7e2e9" filter="url(#softShadow)"/>
  <rect x="18" y="18" width="964" height="424" rx="20" fill="url(#grid)" opacity=".48"/>

  <g transform="translate(44 48)">
    <text class="title" x="0" y="0">Research Snapshot</text>
    <text class="subtitle" x="0" y="25">Evolutionary computation for expensive engineering optimization in wind energy systems</text>
  </g>

  <g transform="translate(638 35)">
    <rect x="0" y="0" width="76" height="28" rx="14" fill="#e9f4f2" stroke="#b9d8d4"/>
    <text class="small" x="38" y="18" text-anchor="middle" fill="#1f6f66">EC</text>
    <rect x="88" y="0" width="122" height="28" rx="14" fill="#edf2fb" stroke="#c5d2ec"/>
    <text class="small" x="149" y="18" text-anchor="middle" fill="#315f9a">Black-box Opt.</text>
    <rect x="222" y="0" width="96" height="28" rx="14" fill="#f7efe4" stroke="#ddc79f"/>
    <text class="small" x="270" y="18" text-anchor="middle" fill="#846029">Wind Energy</text>
  </g>

  <g transform="translate(44 98)">
    <rect width="252" height="250" rx="15" fill="#ffffff" stroke="#dbe5ec"/>
    <text class="label" x="20" y="31">Problem Space</text>
    <text class="tiny mono" x="20" y="51">cost pressure x dimensionality</text>

    <g transform="translate(38 75)">
      <line class="axis" x1="0" y1="140" x2="184" y2="140"/>
      <line class="axis" x1="0" y1="140" x2="0" y2="0"/>
      <text class="tiny" x="97" y="164" text-anchor="middle">decision variables</text>
      <text class="tiny" x="-54" y="-14" transform="rotate(-90)">evaluation cost</text>
      <path d="M0 106H184M0 70H184M0 35H184" stroke="#e2e9ef" stroke-width="1"/>
      <path d="M46 0V140M92 0V140M138 0V140" stroke="#e2e9ef" stroke-width="1"/>

      <circle cx="36" cy="108" r="6" fill="#7b5d8f" opacity=".86"/>
      <text class="tiny" x="46" y="112">feature selection</text>
      <circle cx="82" cy="72" r="7" fill="#3267a5" opacity=".9"/>
      <text class="tiny" x="93" y="76">yaw control</text>
      <circle cx="123" cy="49" r="8" fill="#2b9a8d" opacity=".9"/>
      <text class="tiny" x="135" y="53">layout</text>
      <circle cx="154" cy="24" r="9" fill="#d59b4a" opacity=".92">
        <animate attributeName="r" values="8;11;8" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <text class="tiny" x="91" y="20">layout + cable routing</text>
    </g>
  </g>

  <g transform="translate(330 90)">
    <path class="flow" d="M-28 132C-6 116 14 108 38 103">
      <animate attributeName="stroke-dashoffset" from="42" to="0" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M-28 132C-6 116 14 108 38 103" fill="none" stroke="none" marker-end="url(#arrow)"/>

    <rect x="0" y="0" width="340" height="266" rx="18" fill="#ffffff" stroke="#dbe5ec"/>
    <text class="label" x="22" y="34">Structure-aware Evolutionary Engine</text>
    <text class="tiny mono" x="22" y="55">population -> variation -> evaluation -> archive</text>

    <g transform="translate(50 88)">
      <circle cx="0" cy="46" r="34" fill="url(#engineFill)" stroke="#b8c8d6" stroke-width="2"/>
      <text class="tiny" x="0" y="38" text-anchor="middle">population</text>
      <text class="tiny" x="0" y="54" text-anchor="middle">states</text>
      <circle cx="-11" cy="23" r="4" fill="#3267a5"/>
      <circle cx="13" cy="30" r="4" fill="#2b9a8d"/>
      <circle cx="-4" cy="65" r="4" fill="#7b5d8f"/>
    </g>

    <g transform="translate(172 88)">
      <circle cx="0" cy="46" r="38" fill="#f6fbfa" stroke="#a9d5cf" stroke-width="2"/>
      <text class="tiny" x="0" y="31" text-anchor="middle">geometry</text>
      <text class="tiny" x="0" y="47" text-anchor="middle">priors</text>
      <text class="tiny" x="0" y="63" text-anchor="middle">operators</text>
      <path d="M-18 68L0 26L20 68Z" fill="none" stroke="#2b9a8d" stroke-width="2"/>
    </g>

    <g transform="translate(286 88)">
      <circle cx="0" cy="46" r="34" fill="#fbf8f1" stroke="#e2c99c" stroke-width="2"/>
      <text class="tiny" x="0" y="38" text-anchor="middle">budgeted</text>
      <text class="tiny" x="0" y="54" text-anchor="middle">evaluator</text>
      <path d="M-12 25H12M-12 46H12M-12 67H12" stroke="#d59b4a" stroke-width="2"/>
    </g>

    <path class="flow" d="M84 134C106 96 134 86 161 103">
      <animate attributeName="stroke-dashoffset" from="42" to="0" dur="3s" repeatCount="indefinite"/>
    </path>
    <path class="flow" d="M211 104C242 84 266 98 278 123">
      <animate attributeName="stroke-dashoffset" from="42" to="0" dur="3s" repeatCount="indefinite"/>
    </path>
    <path class="flow" d="M272 170C210 226 96 220 54 166">
      <animate attributeName="stroke-dashoffset" from="42" to="0" dur="3s" repeatCount="indefinite"/>
    </path>

    <g transform="translate(44 205)">
      <rect width="118" height="34" rx="10" fill="#f3f6f9" stroke="#dbe5ec"/>
      <text class="small" x="59" y="22" text-anchor="middle">archive memory</text>
      <rect x="134" width="118" height="34" rx="10" fill="#f3f6f9" stroke="#dbe5ec"/>
      <text class="small" x="193" y="22" text-anchor="middle">diversity control</text>
      <circle cx="126" cy="17" r="3.5" fill="#7b5d8f">
        <animate attributeName="opacity" values=".3;1;.3" dur="2.2s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <g transform="translate(704 98)">
    <path class="flow" d="M-35 124C-8 110 8 105 30 100">
      <animate attributeName="stroke-dashoffset" from="42" to="0" dur="3s" repeatCount="indefinite"/>
    </path>

    <rect width="252" height="250" rx="15" fill="#ffffff" stroke="#dbe5ec"/>
    <text class="label" x="20" y="31">Wind Energy Systems</text>
    <text class="tiny mono" x="20" y="51">layout + routing + yaw control</text>

    <g transform="translate(28 73)">
      <path d="M18 132C56 98 86 116 122 82C152 54 178 70 206 36" fill="none" stroke="#dbe4ea" stroke-width="10" stroke-linecap="round"/>
      <path d="M18 132C56 98 86 116 122 82C152 54 178 70 206 36" fill="none" stroke="#2b9a8d" stroke-width="2.5" stroke-dasharray="8 8" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" from="32" to="0" dur="2.5s" repeatCount="indefinite"/>
      </path>

      <g stroke="#3267a5" stroke-width="2" fill="none">
        <path d="M34 112V75M34 75L16 62M34 75L52 61M34 75L35 51"/>
        <path d="M91 102V64M91 64L72 52M91 64L110 51M91 64L92 40"/>
        <path d="M146 70V33M146 33L128 21M146 33L164 20M146 33L148 9"/>
        <path d="M196 45V13M196 13L180 2M196 13L212 2M196 13L198 -8"/>
      </g>
      <g fill="#ffffff" stroke="#7b5d8f" stroke-width="2">
        <circle cx="34" cy="112" r="9"/>
        <circle cx="91" cy="102" r="9"/>
        <circle cx="146" cy="70" r="9"/>
        <circle cx="196" cy="45" r="9"/>
      </g>
      <g fill="#d59b4a">
        <path d="M32 101A24 24 0 0 1 57 112" fill="none" stroke="#d59b4a" stroke-width="2"/>
        <path d="M89 91A24 24 0 0 1 114 102" fill="none" stroke="#d59b4a" stroke-width="2"/>
        <path d="M144 59A24 24 0 0 1 169 70" fill="none" stroke="#d59b4a" stroke-width="2"/>
      </g>
    </g>

    <g transform="translate(21 214)">
      <rect width="58" height="22" rx="8" fill="#edf2fb" stroke="#c5d2ec"/>
      <text class="tiny" x="29" y="15" text-anchor="middle">layout</text>
      <rect x="68" width="64" height="22" rx="8" fill="#e9f4f2" stroke="#b9d8d4"/>
      <text class="tiny" x="100" y="15" text-anchor="middle">cables</text>
      <rect x="142" width="68" height="22" rx="8" fill="#f7efe4" stroke="#ddc79f"/>
      <text class="tiny" x="176" y="15" text-anchor="middle">yaw</text>
    </g>
  </g>

  <g transform="translate(44 378)">
    <rect width="912" height="42" rx="15" fill="#172238"/>
    <text class="darkSmall mono" x="23" y="26">evidence chain</text>
    <line x1="134" y1="21" x2="790" y2="21" stroke="#425469" stroke-width="1.5"/>
    <g transform="translate(168 0)">
      <circle cx="0" cy="21" r="7" fill="#3267a5"/>
      <text class="darkTiny" x="18" y="25">DOI-linked publications</text>
    </g>
    <g transform="translate(348 0)">
      <circle cx="0" cy="21" r="7" fill="#2b9a8d"/>
      <text class="darkTiny" x="18" y="25">open repositories</text>
    </g>
    <g transform="translate(508 0)">
      <circle cx="0" cy="21" r="7" fill="#d59b4a"/>
      <text class="darkTiny" x="18" y="25">budgeted benchmarks</text>
    </g>
    <g transform="translate(706 0)">
      <circle cx="0" cy="21" r="7" fill="#7b5d8f"/>
      <text class="darkTiny" x="18" y="25">traceable artifacts</text>
    </g>
  </g>
</svg>
