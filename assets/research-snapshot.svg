<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260" role="img" aria-labelledby="title desc">
  <title id="title">Research map</title>
  <desc id="desc">A clean four-stage academic research map from problem definition to evolutionary search, wind energy design, and reproducible evidence.</desc>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa7e8"/>
      <stop offset=".5" stop-color="#74c7bb"/>
      <stop offset="1" stop-color="#b39ddb"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#7d8ca1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #1c2433;
      }
      .mono { font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace; }
      .kicker { font-size: 12px; font-weight: 760; letter-spacing: 1px; fill: #728094; }
      .title { font-size: 26px; font-weight: 780; }
      .subtitle { font-size: 14px; fill: #68778c; }
      .cardTitle { font-size: 16px; font-weight: 760; }
      .line { font-size: 12px; fill: #657489; }
      .card { fill: #ffffff; stroke: #dfe7f0; stroke-width: 1.2; }
      .flow { fill: none; stroke: url(#accent); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 10 12; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="800" height="260" rx="24" fill="#ffffff"/>
  <rect x="24" y="24" width="752" height="212" rx="22" fill="#fbfdff" stroke="#edf2f7"/>

  <g transform="translate(44 56)">
    <text class="kicker mono" x="0" y="0">RESEARCH MAP</text>
    <text class="title" x="0" y="34">Evolutionary optimization for wind energy systems</text>
    <text class="subtitle" x="0" y="59">Constrained decisions become traceable engineering evidence.</text>
  </g>

  <g transform="translate(44 130)">
    <rect class="card" x="0" y="0" width="145" height="78" rx="16"/>
    <circle cx="22" cy="25" r="7" fill="#7aa7e8"/>
    <text class="cardTitle" x="38" y="30">Problem</text>
    <text class="line" x="20" y="56">layout, cable, yaw</text>
  </g>

  <path class="flow" d="M203 169H230">
    <animate attributeName="stroke-dashoffset" from="44" to="0" dur="2.8s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(244 130)">
    <rect class="card" x="0" y="0" width="145" height="78" rx="16"/>
    <circle cx="22" cy="25" r="7" fill="#74c7bb"/>
    <text class="cardTitle" x="38" y="30">Search</text>
    <text class="line" x="20" y="56">DE, GA, LSHADE</text>
  </g>

  <path class="flow" d="M403 169H430">
    <animate attributeName="stroke-dashoffset" from="44" to="0" dur="2.8s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(444 130)">
    <rect class="card" x="0" y="0" width="145" height="78" rx="16"/>
    <circle cx="22" cy="25" r="7" fill="#e4ba75"/>
    <text class="cardTitle" x="38" y="30">Design</text>
    <text class="line" x="20" y="56">wind energy systems</text>
  </g>

  <path class="flow" d="M603 169H630">
    <animate attributeName="stroke-dashoffset" from="44" to="0" dur="2.8s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(644 130)">
    <rect class="card" x="0" y="0" width="112" height="78" rx="16"/>
    <circle cx="20" cy="25" r="7" fill="#b39ddb"/>
    <text class="cardTitle" x="36" y="30">Evidence</text>
    <text class="line" x="18" y="56">papers, code</text>
  </g>
</svg>
