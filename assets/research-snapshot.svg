<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="1000" height="320" role="img" aria-labelledby="title desc">
  <title id="title">Research map</title>
  <desc id="desc">A clean four-stage academic research map from problem definition to evolutionary search, wind energy design, and reproducible evidence.</desc>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7aa7e8"/>
      <stop offset=".5" stop-color="#74c7bb"/>
      <stop offset="1" stop-color="#b39ddb"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#7d8ca1" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        fill: #1c2433;
      }
      .mono { font-family: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace; }
      .kicker { font-size: 12px; font-weight: 760; letter-spacing: 1px; fill: #728094; }
      .title { font-size: 28px; font-weight: 780; }
      .subtitle { font-size: 14px; fill: #68778c; }
      .cardTitle { font-size: 16px; font-weight: 760; }
      .line { font-size: 12px; fill: #657489; }
      .tag { font-size: 11px; font-weight: 680; fill: #4f6074; }
      .card { fill: #ffffff; stroke: #dfe7f0; stroke-width: 1.2; }
      .flow { fill: none; stroke: url(#accent); stroke-width: 3; stroke-linecap: round; stroke-dasharray: 10 12; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1000" height="320" rx="26" fill="#ffffff"/>
  <rect x="28" y="28" width="944" height="264" rx="24" fill="#fbfdff" stroke="#edf2f7"/>

  <g transform="translate(60 62)">
    <text class="kicker mono" x="0" y="0">RESEARCH MAP</text>
    <text class="title" x="0" y="36">Evolutionary optimization for wind energy systems</text>
    <text class="subtitle" x="0" y="62">A compact route from constrained engineering decisions to traceable research evidence.</text>
  </g>

  <g transform="translate(60 138)">
    <rect class="card" x="0" y="0" width="178" height="104" rx="18"/>
    <circle cx="28" cy="30" r="8" fill="#7aa7e8"/>
    <text class="cardTitle" x="48" y="35">Problem Space</text>
    <text class="line" x="24" y="66">layout, cable, yaw</text>
    <text class="line" x="24" y="86">constraints and cost</text>
  </g>

  <path class="flow" d="M256 190H292">
    <animate attributeName="stroke-dashoffset" from="44" to="0" dur="2.8s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(308 138)">
    <rect class="card" x="0" y="0" width="178" height="104" rx="18"/>
    <circle cx="28" cy="30" r="8" fill="#74c7bb"/>
    <text class="cardTitle" x="48" y="35">Search Engine</text>
    <text class="line" x="24" y="66">DE, GA, LSHADE</text>
    <text class="line" x="24" y="86">budgeted evolution</text>
  </g>

  <path class="flow" d="M504 190H540">
    <animate attributeName="stroke-dashoffset" from="44" to="0" dur="2.8s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(556 138)">
    <rect class="card" x="0" y="0" width="178" height="104" rx="18"/>
    <circle cx="28" cy="30" r="8" fill="#e4ba75"/>
    <text class="cardTitle" x="48" y="35">Wind Design</text>
    <text class="line" x="24" y="66">layout and routing</text>
    <text class="line" x="24" y="86">wake-aware control</text>
  </g>

  <path class="flow" d="M752 190H788">
    <animate attributeName="stroke-dashoffset" from="44" to="0" dur="2.8s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(804 138)">
    <rect class="card" x="0" y="0" width="136" height="104" rx="18"/>
    <circle cx="26" cy="30" r="8" fill="#b39ddb"/>
    <text class="cardTitle" x="44" y="35">Evidence</text>
    <text class="line" x="22" y="66">papers, code</text>
    <text class="line" x="22" y="86">benchmarks</text>
  </g>

  <g transform="translate(60 268)">
    <rect x="0" y="0" width="152" height="24" rx="12" fill="#f3f8ff" stroke="#dbe8f8"/>
    <text class="tag" x="18" y="16">structure-aware</text>
    <rect x="168" y="0" width="130" height="24" rx="12" fill="#f1fbf8" stroke="#d7eee8"/>
    <text class="tag" x="186" y="16">limited budget</text>
    <rect x="314" y="0" width="154" height="24" rx="12" fill="#fbf6ed" stroke="#eadfc9"/>
    <text class="tag" x="332" y="16">engineering design</text>
    <rect x="484" y="0" width="142" height="24" rx="12" fill="#faf7ff" stroke="#e4d9f2"/>
    <text class="tag" x="502" y="16">reproducibility</text>
  </g>
</svg>
