<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 238" width="220" height="238" role="img" aria-labelledby="title desc">
  <title id="title">Banban waving</title>
  <desc id="desc">A small fluffy gray hamster named Banban waving as a research companion.</desc>
  <defs>
    <radialGradient id="fur" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#f6f2ec"/>
      <stop offset="48%" stop-color="#b9b6ad"/>
      <stop offset="100%" stop-color="#6f716d"/>
    </radialGradient>
    <radialGradient id="face" cx="50%" cy="42%" r="54%">
      <stop offset="0%" stop-color="#fff9f1"/>
      <stop offset="58%" stop-color="#d8d2c7"/>
      <stop offset="100%" stop-color="#8d8d86"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#08111f" flood-opacity=".24"/>
    </filter>
    <style>
      .fur-line {
        fill: none;
        stroke: #5f625f;
        stroke-width: 3;
        stroke-linecap: round;
        opacity: .48;
      }
      .spark {
        fill: #9ef3c5;
        opacity: .85;
      }
    </style>
  </defs>

  <g filter="url(#softShadow)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 2;0 -3;0 2" dur="2.4s" repeatCount="indefinite"/>

      <ellipse cx="72" cy="77" rx="25" ry="28" fill="url(#fur)"/>
      <ellipse cx="148" cy="77" rx="25" ry="28" fill="url(#fur)"/>
      <ellipse cx="72" cy="79" rx="13" ry="15" fill="#f2c7c4" opacity=".72"/>
      <ellipse cx="148" cy="79" rx="13" ry="15" fill="#f2c7c4" opacity=".72"/>

      <ellipse cx="110" cy="136" rx="74" ry="84" fill="url(#fur)"/>
      <ellipse cx="110" cy="107" rx="63" ry="57" fill="url(#face)"/>

      <path class="fur-line" d="M59 119c-12 16-16 34-12 53"/>
      <path class="fur-line" d="M77 139c-8 18-9 35-3 52"/>
      <path class="fur-line" d="M104 147c-3 20-2 36 4 52"/>
      <path class="fur-line" d="M137 140c7 18 7 35 1 52"/>
      <path class="fur-line" d="M158 119c11 16 15 34 11 53"/>
      <path class="fur-line" d="M74 84c13-11 29-15 47-13"/>
      <path class="fur-line" d="M123 72c14 1 26 6 37 16"/>

      <ellipse cx="84" cy="102" rx="8" ry="10" fill="#171b20"/>
      <ellipse cx="136" cy="102" rx="8" ry="10" fill="#171b20"/>
      <circle cx="87" cy="98" r="2.4" fill="#ffffff"/>
      <circle cx="139" cy="98" r="2.4" fill="#ffffff"/>
      <ellipse cx="110" cy="119" rx="7" ry="5.5" fill="#ee9da1"/>
      <path d="M103 130c5 6 10 6 14 0" fill="none" stroke="#6d5c5f" stroke-width="3" stroke-linecap="round"/>

      <ellipse cx="88" cy="158" rx="15" ry="19" fill="#c9c4ba"/>

      <g transform-origin="137px 152px">
        <animateTransform attributeName="transform" type="rotate" values="-10 137 152;20 137 152;-12 137 152" dur="1.15s" repeatCount="indefinite"/>
        <ellipse cx="142" cy="151" rx="16" ry="22" fill="#c9c4ba"/>
        <circle cx="150" cy="132" r="6" fill="#f1c8c2"/>
      </g>

      <ellipse cx="86" cy="207" rx="20" ry="13" fill="#8d8d86"/>
      <ellipse cx="134" cy="207" rx="20" ry="13" fill="#8d8d86"/>
    </g>
  </g>

  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -4;0 0" dur="1.8s" repeatCount="indefinite"/>
    <path class="spark" d="M178 50l5 10 11 2-8 8 2 11-10-5-10 5 2-11-8-8 11-2z"/>
    <path class="spark" d="M38 52l3 7 8 1-6 5 2 8-7-4-7 4 2-8-6-5 8-1z" opacity=".58"/>
  </g>
</svg>
