<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 320 260" width="320" height="260" role="img" aria-labelledby="title desc">
  <title id="title">BanBan under sakura rain</title>
  <desc id="desc">An animated memorial stage that uses the local BanBan pet image with sakura rain and a soft halo.</desc>
  <defs>
    <path id="petal" d="M0 -7C6 -5 8 1 3 7C1 10 -2 10 -4 7C-8 1 -6 -5 0 -7Z"/>
    <style>
      .petalA{fill:#f6b6c8;opacity:.62}
      .petalB{fill:#f9cbd8;opacity:.52}
      .petalC{fill:#f2a9bf;opacity:.44}
      .haloGlow{fill:none;stroke:#fff1a8;stroke-width:8;stroke-linecap:round;opacity:.38}
      .haloRing{fill:none;stroke:#d9a928;stroke-width:4;stroke-linecap:round;opacity:.92}
      .haloCore{fill:#fff1a8;opacity:.24}
    </style>
  </defs>
  <rect width="320" height="260" fill="#fff" opacity="0"/>

  <g transform="translate(48 -16)">
    <use href="#petal" class="petalA"/>
    <animateTransform attributeName="transform" type="translate" values="48 -16;72 230" dur="6.4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0;220" dur="6.4s" repeatCount="indefinite" additive="sum"/>
  </g>
  <g transform="translate(104 -42)">
    <use href="#petal" class="petalB"/>
    <animateTransform attributeName="transform" type="translate" values="104 -42;76 230" dur="7.2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="20;260" dur="7.2s" repeatCount="indefinite" additive="sum"/>
  </g>
  <g transform="translate(160 -24)">
    <use href="#petal" class="petalC"/>
    <animateTransform attributeName="transform" type="translate" values="160 -24;194 230" dur="5.9s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-18;210" dur="5.9s" repeatCount="indefinite" additive="sum"/>
  </g>
  <g transform="translate(224 -50)">
    <use href="#petal" class="petalA"/>
    <animateTransform attributeName="transform" type="translate" values="224 -50;268 230" dur="7.8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="12;250" dur="7.8s" repeatCount="indefinite" additive="sum"/>
  </g>
  <g transform="translate(282 -22)">
    <use href="#petal" class="petalB"/>
    <animateTransform attributeName="transform" type="translate" values="282 -22;250 230" dur="6.7s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-10;230" dur="6.7s" repeatCount="indefinite" additive="sum"/>
  </g>

  <ellipse cx="160" cy="232" rx="54" ry="8" fill="#d7c6c0" opacity=".24">
    <animate attributeName="rx" values="49;58;49" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".16;.28;.16" dur="1s" repeatCount="indefinite"/>
  </ellipse>

  <g transform-origin="160 146">
    <animateTransform attributeName="transform" type="translate" values="-2 0;2 -7;-2 0" dur="1s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-2 160 146;2 160 146;-2 160 146" dur="2s" repeatCount="indefinite" additive="sum"/>
    <image x="64" y="42" width="192" height="208" preserveAspectRatio="xMidYMid meet" href="https://raw.githubusercontent.com/zbh0528/zbh0528/main/assets/ban-ban-wave.svg" xlink:href="https://raw.githubusercontent.com/zbh0528/zbh0528/main/assets/ban-ban-wave.svg"/>
  </g>

  <g class="halo" transform="translate(160 58)">
    <ellipse class="haloGlow" rx="34" ry="9">
      <animate attributeName="opacity" values=".24;.45;.24" dur="2.8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse class="haloCore" rx="30" ry="8">
      <animate attributeName="opacity" values=".10;.22;.10" dur="2.8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse class="haloRing" rx="34" ry="9">
      <animate attributeName="rx" values="31;35;31" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="7.5;9.5;7.5" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".78;1;.78" dur="2.8s" repeatCount="indefinite"/>
    </ellipse>
    <animateTransform attributeName="transform" type="translate" values="160 58;160 54;160 58" dur="2.8s" repeatCount="indefinite"/>
  </g>
</svg>
